<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le mie ricette</title>

<link rel="stylesheet" href="ricette.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff8c42">

    
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</head>

<body>

<header>
    <h1>Le mie ricette</h1>
    <div id="backupLight"></div>
</header>

<main id="mainView">

    <input id="searchInput" type="text" placeholder="Cerca ricetta...">

    <div id="lista"></div>

    <button id="addBtn" class="floatingBtn">＋</button>

</main>

<section id="dettaglioView" style="display:none;">

    <button id="backBtn" class="backBtn">←</button>

    <h2 id="detTitle"></h2>

    <img id="detFoto" style="display:none; max-width:100%; border-radius:10px; margin-bottom:10px;">

    <div class="box">
        <h3>Ingredienti</h3>
        <div id="detIng"></div>
    </div>

    <div class="box">
        <h3>Procedimento</h3>
        <div id="detProc"></div>
    </div>

    <div id="detMeta"></div>

    <div class="detBtns">
        <button id="editDetBtn" class="editBtn">Modifica</button>
        <button id="deleteDetBtn" class="deleteBtn">Elimina</button>
    </div>

</section>

<input type="file" id="fileInput" accept="application/json" style="display:none;">
<button id="exportBtn" class="exportBtn">Esporta</button>
<button id="importBtn" class="importBtn">Importa</button>

<script src="ricette.js"></script>
</body>
</html>
