<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le mie ricette</title>

  <!-- Manifest PWA (lasciamo il tuo) -->
  <link rel="manifest" href="manifest.json">

  <!-- CSS nuovo -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="title">
    <span class="title-main">Le mie ricette</span>
    <span class="title-sub" id="titleSub">sempre con te</span>
  </div>
  <div class="status" id="syncStatus">Sync…</div>
</header>

<div class="top-bar">
  <input id="searchInput" type="text" placeholder="Cerca ricetta..." />
  <button id="addBtn" class="primary">+ Nuova</button>
</div>

<main>
  <div id="lista" class="cards"></div>
</main>

<!-- Modale per aggiunta/modifica -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Nuova ricetta</h2>

    <label>Titolo</label>
    <input id="nomeInput" type="text">

    <label>Ingredienti (uno per riga)</label>
    <textarea id="ingredientiInput" rows="5"></textarea>

    <label>Procedimento</label>
    <textarea id="procedimentoInput" rows="6"></textarea>

    <div class="modal-actions">
      <button id="cancelBtn">Annulla</button>
      <button id="saveBtn" class="primary">Salva</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

<script>
  // Registrazione service worker PWA (usa il tuo service-worker.js)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .catch(err => console.log('SW error', err));
    });
  }
</script>

</body>
</html>
